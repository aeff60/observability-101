# ============================================================
# Tempo Configuration - Distributed Tracing Backend
# ============================================================
# Tempo stores and queries distributed traces.
# It receives traces from the OTel Collector via OTLP gRPC.
#
# Flow:
#   OTel Collector → Tempo (:4317) → Grafana queries (:3200)
# ============================================================

server:
  http_listen_port: 3200
  log_level: warn

# How Tempo receives traces
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

# How Tempo buffers spans in memory before writing to disk
ingester:
  max_block_duration: 5m

# Compaction settings
compactor:
  compaction:
    block_retention: 1h   # Keep traces for 1 hour (workshop-friendly)

# Storage backend (local disk)
storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Query performance settings
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

# Metrics generator — creates span-derived metrics (optional)
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: workshop
  storage:
    path: /var/tempo/generator/wal
